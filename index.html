<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Safety Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes pulse-alert {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .alert-pulse {
            animation: pulse-alert 1s infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    {% raw %}
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [isDetecting, setIsDetecting] = useState(false);
            const [currentDetection, setCurrentDetection] = useState('awake');
            const [confidence, setConfidence] = useState(0);
            const [alerts, setAlerts] = useState({
                yawn_alarm: false,
                eyes_closed_alarm: false,
                eyes_closed: false,
                distracted: false,
                phone: false,
                smoking: false
            });
            const [state, setState] = useState({
                yawn_count: 0,
                eyes_closed_frames: 0,
                distracted_frames: 0
            });
            const [yawnAlarmTime, setYawnAlarmTime] = useState(10);
            const [videoFeedKey, setVideoFeedKey] = useState(0);
            const [environment, setEnvironment] = useState({
                is_night: false,
                is_raining: false,
                weather_description: 'Unknown'
            });
            const [activeThresholds, setActiveThresholds] = useState({
                yawn_consecutive: 3,
                eyes_closed_seconds: 4,
                distracted_frames: 120
            });
            const [notifications, setNotifications] = useState([]);
            
            const statusIntervalRef = useRef(null);
            const notificationsIntervalRef = useRef(null);
            const ttsRef = useRef(null);
            const videoRef = useRef(null);
            const alarmSoundRef = useRef(null);

            useEffect(() => {
                if (isDetecting) {
                    statusIntervalRef.current = setInterval(fetchStatus, 500);
                    notificationsIntervalRef.current = setInterval(fetchNotifications, 2000);
                } else {
                    if (statusIntervalRef.current) {
                        clearInterval(statusIntervalRef.current);
                    }
                    if (notificationsIntervalRef.current) {
                        clearInterval(notificationsIntervalRef.current);
                    }
                }
                return () => {
                    if (statusIntervalRef.current) {
                        clearInterval(statusIntervalRef.current);
                    }
                    if (notificationsIntervalRef.current) {
                        clearInterval(notificationsIntervalRef.current);
                    }
                };
            }, [isDetecting]);

            useEffect(() => {
                if (isDetecting) setVideoFeedKey(Date.now());
            }, [isDetecting]);

            useEffect(() => {
                // Handle TTS (voice) alerts - Web Speech API
                if (alerts.distracted && !ttsRef.current) {
                    speakAlert("Please do not get distracted");
                } else if (!alerts.distracted && ttsRef.current) {
                    stopSpeaking();
                }

                if (alerts.phone && !ttsRef.current) {
                    speakAlert("Please do not use phone");
                } else if (!alerts.phone && ttsRef.current) {
                    stopSpeaking();
                }

                if (alerts.smoking && !ttsRef.current) {
                    speakAlert("Please do not smoke inside car");
                } else if (!alerts.smoking && ttsRef.current) {
                    stopSpeaking();
                }

                // Voice for eyes closed (4s): "Please keep your eyes open" until eyes open
                if (alerts.eyes_closed_alarm && !ttsRef.current) {
                    speakAlert("Please keep your eyes open");
                } else if (!alerts.eyes_closed_alarm && ttsRef.current) {
                    stopSpeaking();
                }
            }, [alerts.distracted, alerts.phone, alerts.smoking, alerts.eyes_closed_alarm]);

            useEffect(() => {
                if (alerts.yawn_alarm) {
                    const interval = setInterval(() => {
                        setYawnAlarmTime(prev => {
                            if (prev <= 0) {
                                clearInterval(interval);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(interval);
                } else {
                    setYawnAlarmTime(10);
                }
            }, [alerts.yawn_alarm]);

            // Play alarm WAV when yawn or eyes-closed alarm; stop when both off (eyes open stops eyes-closed alarm)
            useEffect(() => {
                const shouldPlay = alerts.yawn_alarm || alerts.eyes_closed_alarm;
                const audio = alarmSoundRef.current;
                if (!audio) return;
                if (shouldPlay) {
                    audio.play().catch(e => console.warn('Alarm play failed:', e));
                } else {
                    audio.pause();
                    audio.currentTime = 0;
                }
            }, [alerts.yawn_alarm, alerts.eyes_closed_alarm]);

            const fetchStatus = async () => {
                try {
                    const response = await fetch('/api/status');
                    const data = await response.json();
                    setCurrentDetection(data.current_detection || 'awake');
                    setConfidence(data.confidence || 0);
                    setAlerts(data.alerts || {});
                    setState(data.state || {});
                    setEnvironment(data.environment || {});
                    setActiveThresholds(data.active_thresholds || {});
                } catch (error) {
                    console.error('Error fetching status:', error);
                }
            };

            const fetchNotifications = async () => {
                try {
                    const response = await fetch('/api/notifications?limit=10');
                    const data = await response.json();
                    setNotifications(data.notifications || []);
                } catch (error) {
                    console.error('Error fetching notifications:', error);
                }
            };

            const speakAlert = (text) => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.onend = () => {
                        if (alerts.distracted || alerts.phone || alerts.smoking || alerts.eyes_closed_alarm) {
                            ttsRef.current = setTimeout(() => speakAlert(text), 2000);
                        } else {
                            ttsRef.current = null;
                        }
                    };
                    window.speechSynthesis.speak(utterance);
                    ttsRef.current = true;
                }
            };

            const stopSpeaking = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    if (ttsRef.current) {
                        clearTimeout(ttsRef.current);
                        ttsRef.current = null;
                    }
                }
            };

            const startWebcam = async () => {
                try {
                    const response = await fetch('/api/start_webcam', {
                        method: 'POST'
                    });
                    const data = await response.json();
                    if (data.status === 'success') {
                        setIsDetecting(true);
                        fetchNotifications();
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (error) {
                    alert('Error starting webcam: ' + error.message);
                }
            };

            const uploadVideo = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('video', file);

                try {
                    const response = await fetch('/api/upload_video', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if (data.status === 'success') {
                        setIsDetecting(true);
                        fetchNotifications();
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (error) {
                    alert('Error uploading video: ' + error.message);
                }
            };

            const stopDetection = async () => {
                try {
                    const res = await fetch('/api/stop_detection', { method: 'POST' });
                    if (!res.ok) throw new Error('Stop failed');
                } catch (error) {
                    console.error('Error stopping detection:', error);
                } finally {
                    setIsDetecting(false);
                    stopSpeaking();
                    setNotifications([]);
                }
            };

            const stopYawnAlarm = async () => {
                try {
                    await fetch('/api/stop_yawn_alarm', { method: 'POST' });
                } catch (error) {
                    console.error('Error stopping yawn alarm:', error);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
                    <audio ref={alarmSoundRef} src="/sounds/mixkit-space-shooter-alarm-1002.wav" loop />
                    {/* Navigation Header */}
                    <nav className="bg-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center">
                                    <h1 className="text-2xl font-bold text-indigo-600">Driver Safety Monitor</h1>
                                </div>
                                <div className="flex space-x-4">
                                    <button
                                        onClick={startWebcam}
                                        disabled={isDetecting}
                                        className={`px-6 py-2 rounded-lg font-semibold transition-all ${
                                            isDetecting
                                                ? 'bg-gray-300 cursor-not-allowed'
                                                : 'bg-indigo-600 text-white hover:bg-indigo-700'
                                        }`}
                                    >
                                        Start Webcam Detection
                                    </button>
                                    <label
                                        className={`px-6 py-2 rounded-lg font-semibold transition-all cursor-pointer ${
                                            isDetecting
                                                ? 'bg-gray-300 cursor-not-allowed'
                                                : 'bg-green-600 text-white hover:bg-green-700'
                                        }`}
                                    >
                                        Upload Video
                                        <input
                                            type="file"
                                            accept="video/*"
                                            onChange={uploadVideo}
                                            disabled={isDetecting}
                                            className="hidden"
                                        />
                                    </label>
                                    {isDetecting && (
                                        <button
                                            onClick={stopDetection}
                                            className="px-6 py-2 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700 transition-all"
                                        >
                                            Stop Detection
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    {!isDetecting && (
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                            <div className="text-center">
                                <h2 className="text-5xl font-extrabold text-gray-900 mb-6">
                                    Advanced Driver Safety Monitoring
                                </h2>
                                <p className="text-xl text-gray-600 mb-8 max-w-3xl mx-auto">
                                    Real-time AI-powered detection system that monitors driver behavior to prevent
                                    accidents and ensure road safety. Detects drowsiness, distraction, phone usage,
                                    and other dangerous behaviors with instant alerts and violation logging.
                                </p>
                                <div className="grid md:grid-cols-3 gap-6 mt-12">
                                    <div className="bg-white p-6 rounded-lg shadow-md">
                                        <div className="text-4xl mb-4">👁️</div>
                                        <h3 className="text-xl font-bold mb-2">Real-time Detection</h3>
                                        <p className="text-gray-600">Continuous monitoring using advanced YOLOv11 AI model</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-lg shadow-md">
                                        <div className="text-4xl mb-4">🚨</div>
                                        <h3 className="text-xl font-bold mb-2">Instant Alerts</h3>
                                        <p className="text-gray-600">Audio and visual alerts for dangerous behaviors</p>
                                    </div>
                                    <div className="bg-white p-6 rounded-lg shadow-md">
                                        <div className="text-4xl mb-4">📧</div>
                                        <h3 className="text-xl font-bold mb-2">Violation Logging</h3>
                                        <p className="text-gray-600">Automatic email notifications with evidence images</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Detection Dashboard */}
                    {isDetecting && (
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* Video Feed */}
                                <div className="lg:col-span-2">
                                    <div className="bg-white rounded-lg shadow-lg p-4">
                                        <h3 className="text-xl font-bold mb-4">Live Detection Feed</h3>
                                        <div className="relative bg-black rounded-lg overflow-hidden" style={{ aspectRatio: '16/9' }}>
                                            <img
                                                key={videoFeedKey}
                                                src={videoFeedKey ? `/video_feed?t=${videoFeedKey}` : ''}
                                                alt="Detection Feed"
                                                className="w-full h-full object-contain"
                                                ref={videoRef}
                                                onError={(e) => { e.target.style.display = 'none'; }}
                                            />
                                            {!videoFeedKey && (
                                                <div className="absolute inset-0 flex items-center justify-center text-gray-400">Starting camera...</div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Status Panel */}
                                <div className="space-y-6">
                                    {/* Current Detection */}
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="text-xl font-bold mb-4">Current Detection</h3>
                                        <div className="text-center">
                                            <div className="text-4xl font-bold text-indigo-600 mb-2 capitalize">
                                                {currentDetection}
                                            </div>
                                            <div className="text-2xl text-gray-600">
                                                {(confidence * 100).toFixed(1)}%
                                            </div>
                                        </div>
                                    </div>

                                    {/* Alert Status */}
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="text-xl font-bold mb-4">Active Alerts</h3>
                                        <div className="space-y-3">
                                            {alerts.yawn_alarm && (
                                                <div className="bg-red-100 border-l-4 border-red-500 p-4 rounded alert-pulse">
                                                    <div className="flex justify-between items-center">
                                                        <div>
                                                            <p className="font-bold text-red-800">Yawn Alarm Active</p>
                                                            <p className="text-sm text-red-600">Auto-stops in {yawnAlarmTime}s</p>
                                                        </div>
                                                        <button
                                                            onClick={stopYawnAlarm}
                                                            className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700"
                                                        >
                                                            Stop
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                            {(alerts.eyes_closed || alerts.eyes_closed_alarm) && (
                                                <div className="bg-orange-100 border-l-4 border-orange-500 p-4 rounded">
                                                    <p className="font-bold text-orange-800">Eyes Closed Alert</p>
                                                    <p className="text-sm text-orange-600">
                                                        {alerts.eyes_closed_alarm ? 'Alarm playing — opens eyes to stop' : 'Email sent with evidence'}
                                                    </p>
                                                </div>
                                            )}
                                            {alerts.distracted && (
                                                <div className="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded">
                                                    <p className="font-bold text-yellow-800">Distraction Alert</p>
                                                    <p className="text-sm text-yellow-600">Voice alert active</p>
                                                </div>
                                            )}
                                            {alerts.phone && (
                                                <div className="bg-purple-100 border-l-4 border-purple-500 p-4 rounded">
                                                    <p className="font-bold text-purple-800">Phone Usage Detected</p>
                                                    <p className="text-sm text-purple-600">Voice alert active</p>
                                                </div>
                                            )}
                                            {alerts.smoking && (
                                                <div className="bg-pink-100 border-l-4 border-pink-500 p-4 rounded">
                                                    <p className="font-bold text-pink-800">Smoking Detected</p>
                                                    <p className="text-sm text-pink-600">Voice alert active</p>
                                                </div>
                                            )}
                                            {!alerts.yawn_alarm && !alerts.eyes_closed_alarm && !alerts.eyes_closed && !alerts.distracted && !alerts.phone && !alerts.smoking && (
                                                <div className="bg-green-100 border-l-4 border-green-500 p-4 rounded">
                                                    <p className="font-bold text-green-800">All Clear</p>
                                                    <p className="text-sm text-green-600">No active alerts</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* State Info */}
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="text-xl font-bold mb-4">Detection State</h3>
                                        <div className="space-y-2 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Yawn Count:</span>
                                                <span className="font-semibold">{state.yawn_count}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Eyes Closed Frames:</span>
                                                <span className="font-semibold">{state.eyes_closed_frames}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Distracted Frames:</span>
                                                <span className="font-semibold">{state.distracted_frames}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Environment Awareness */}
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <h3 className="text-xl font-bold mb-4">Weather + Time Context</h3>
                                        <div className="space-y-2 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Night Driving:</span>
                                                <span className={`font-semibold ${environment.is_night ? 'text-orange-600' : 'text-green-600'}`}>
                                                    {environment.is_night ? 'Yes' : 'No'}
                                                </span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Rain Condition:</span>
                                                <span className={`font-semibold ${environment.is_raining ? 'text-blue-600' : 'text-green-600'}`}>
                                                    {environment.is_raining ? 'Raining' : 'Clear'}
                                                </span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-600">Weather:</span>
                                                <span className="font-semibold capitalize">{environment.weather_description || 'Unknown'}</span>
                                            </div>
                                        </div>
                                        <div className="mt-4 pt-3 border-t border-gray-200 text-xs text-gray-600">
                                            <p>Adaptive thresholds active:</p>
                                            <p>Yawn: {activeThresholds.yawn_consecutive}</p>
                                            <p>Eyes closed: {activeThresholds.eyes_closed_seconds}s</p>
                                            <p>Distracted frames: {activeThresholds.distracted_frames}</p>
                                        </div>
                                    </div>

                                    {/* Admin Notifications Feed */}
                                    <div className="bg-white rounded-lg shadow-lg p-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="text-xl font-bold">Admin Notifications</h3>
                                            <button
                                                onClick={fetchNotifications}
                                                className="px-3 py-1 text-sm bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-200"
                                            >
                                                Refresh
                                            </button>
                                        </div>
                                        <div className="space-y-3 max-h-64 overflow-y-auto pr-1">
                                            {notifications.length === 0 && (
                                                <p className="text-sm text-gray-500">No notifications yet.</p>
                                            )}
                                            {notifications.map((item, idx) => (
                                                <div
                                                    key={`${item.timestamp}-${idx}`}
                                                    className={`border-l-4 rounded p-3 ${
                                                        item.severity === 'critical'
                                                            ? 'bg-red-50 border-red-500'
                                                            : 'bg-yellow-50 border-yellow-500'
                                                    }`}
                                                >
                                                    <p className="font-semibold text-sm capitalize">
                                                        {item.event_type.replace('_', ' ')} ({item.severity})
                                                    </p>
                                                    <p className="text-xs text-gray-700">{item.message}</p>
                                                    <p className="text-xs text-gray-500 mt-1">
                                                        {new Date(item.timestamp).toLocaleTimeString()}
                                                    </p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    {% endraw %}
</body>
</html>
